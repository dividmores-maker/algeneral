<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة السنتر التعليمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-base:      #080808;
            --gold:         #d4a017;
            --gold-hi:      #f5c842;
            --gold-soft:    #e8c96a;
            --crimson:      #c0182a;
            --crimson-hi:   #e8203a;
            --crimson-soft: #ff6070;
            --white:        #ffffff;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-base);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── Background ── */
        .bg-layer { position: fixed; inset: 0; z-index: 0; }

        .bg-gradient {
            position: absolute; inset: 0;
            background:
                radial-gradient(ellipse 75% 55% at 50% -5%,  rgba(212,160,23,.38) 0%, transparent 62%),
                radial-gradient(ellipse 55% 45% at 85% 85%,  rgba(192,24,42,.28)  0%, transparent 55%),
                radial-gradient(ellipse 45% 38% at 15% 75%,  rgba(212,160,23,.16) 0%, transparent 50%),
                radial-gradient(ellipse 30% 28% at 75% 10%,  rgba(192,24,42,.12)  0%, transparent 48%),
                linear-gradient(160deg, #0d0900 0%, #110a00 40%, #080808 70%, #0d0203 100%);
        }

        .grid-lines {
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(212,160,23,.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212,160,23,.05) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .dot-grid {
            position: absolute; inset: 0;
            background-image: radial-gradient(rgba(212,160,23,.13) 1px, transparent 1px);
            background-size: 30px 30px;
            mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black, transparent);
        }

        .orb {
            position: absolute; border-radius: 50%;
            filter: blur(80px);
            animation: floatOrb 8s ease-in-out infinite;
        }
        .orb-1 { width:420px; height:420px; background:rgba(212,160,23,.22); top:-110px; left:50%; transform:translateX(-50%); animation-delay:0s; }
        .orb-2 { width:300px; height:300px; background:rgba(192,24,42,.2);   bottom:10%; right:-50px; animation-delay:-3s; }
        .orb-3 { width:250px; height:250px; background:rgba(212,160,23,.12); bottom:20%; left:-30px;  animation-delay:-5s; }

        @keyframes floatOrb {
            0%,100% { transform: translateY(0) translateX(0); }
            33%      { transform: translateY(-20px) translateX(10px); }
            66%      { transform: translateY(10px) translateX(-10px); }
        }

        .glow-line {
            position: absolute; height: 1px; left: 0; right: 0; opacity: 0;
            background: linear-gradient(90deg, transparent, rgba(212,160,23,.55), transparent);
            animation: scanLine 4s ease-in-out infinite;
        }
        .glow-line-1 { top: 30%; animation-delay: 0s; }
        .glow-line-2 { top: 65%; animation-delay: 2s; background: linear-gradient(90deg, transparent, rgba(192,24,42,.45), transparent); }

        @keyframes scanLine {
            0%   { opacity:0; transform:scaleX(0); }
            50%  { opacity:1; transform:scaleX(1); }
            100% { opacity:0; transform:scaleX(0); }
        }

        /* ── Container ── */
        .container {
            position: relative; z-index: 10;
            text-align: center;
            padding: 40px 20px;
            width: 100%; max-width: 500px;
        }

        /* ── Logo badge ── */
        .logo-badge {
            display: inline-flex; align-items: center; gap: 10px;
            background: rgba(212,160,23,.1);
            border: 1px solid rgba(212,160,23,.28);
            border-radius: 50px;
            padding: 10px 24px;
            margin-bottom: 32px;
            backdrop-filter: blur(12px);
            animation: fadeSlideDown .8s ease both;
            box-shadow: 0 0 24px rgba(212,160,23,.08);
        }
        .logo-icon {
            font-size: 22px;
            filter: drop-shadow(0 0 8px rgba(212,160,23,.9));
        }
        .logo-text {
            font-size: 14px; font-weight: 700;
            color: var(--gold-soft);
            letter-spacing: 1px;
        }

        /* ── Spinner ── */
        .spinner-wrapper {
            position: relative;
            width: 90px; height: 90px;
            margin: 0 auto 36px;
            animation: fadeSlideDown .8s ease .2s both;
        }

        .spinner-ring {
            position: absolute; inset: 0;
            border-radius: 50%;
            border: 2px solid transparent;
            animation: spinRing 1.8s linear infinite;
        }
        .spinner-ring-1 {
            border-top-color: var(--gold-hi);
            border-right-color: var(--gold-hi);
            filter: drop-shadow(0 0 7px var(--gold-hi));
        }
        .spinner-ring-2 {
            inset: 12px;
            border-top-color: var(--crimson-hi);
            animation-direction: reverse;
            animation-duration: 1.2s;
            opacity: .75;
            filter: drop-shadow(0 0 5px var(--crimson-hi));
        }
        .spinner-ring-3 {
            inset: 24px;
            border-top-color: var(--gold-soft);
            animation-duration: 2.4s;
            opacity: .45;
        }
        .spinner-core {
            position: absolute; inset: 32px;
            background: radial-gradient(circle, rgba(212,160,23,.7), rgba(192,24,42,.4));
            border-radius: 50%;
            filter: blur(3px);
            animation: pulseCore 2s ease-in-out infinite;
        }

        @keyframes spinRing  { to { transform: rotate(360deg); } }
        @keyframes pulseCore {
            0%,100% { opacity:.6; transform:scale(.9); }
            50%      { opacity:1; transform:scale(1.1); }
        }

        /* ── Title ── */
        .main-title {
            font-size: clamp(28px, 7vw, 42px);
            font-weight: 900; line-height: 1.3;
            color: var(--white);
            margin-bottom: 14px;
            animation: fadeSlideDown .8s ease .4s both;
        }
        .title-highlight {
            background: linear-gradient(135deg, var(--gold-hi) 0%, var(--gold-soft) 45%, var(--crimson-soft) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            filter: drop-shadow(0 0 20px rgba(212,160,23,.5));
            display: block;
        }

        /* ── Subtitle ── */
        .subtitle {
            font-size: 15px;
            color: rgba(255,255,255,.55);
            margin-bottom: 40px;
            animation: fadeSlideDown .8s ease .6s both;
        }

        /* ── Progress ── */
        .progress-container {
            width: 100%; max-width: 280px;
            margin: 0 auto 20px;
            animation: fadeSlideDown .8s ease .7s both;
        }
        .progress-track {
            height: 4px;
            background: rgba(255,255,255,.08);
            border-radius: 10px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; border-radius: 10px;
            background: linear-gradient(90deg, var(--crimson), var(--gold), var(--gold-hi));
            box-shadow: 0 0 12px rgba(212,160,23,.7);
            animation: progressLoad 1.2s ease forwards;
            width: 0%;
        }
        @keyframes progressLoad {
            0%   { width:0%; }
            60%  { width:70%; }
            80%  { width:85%; }
            100% { width:100%; }
        }

        /* ── Loading text ── */
        .loading-text {
            font-size: 13px; font-weight: 600;
            color: rgba(212,160,23,.85);
            animation: fadeSlideDown .8s ease .8s both, blink 1.5s ease-in-out infinite;
            font-family: 'Space Mono', monospace;
            letter-spacing: 1px;
        }
        @keyframes blink {
            0%,100% { opacity:.55; }
            50%      { opacity:1; }
        }

        /* ── Particles ── */
        .particles { position:fixed; inset:0; z-index:1; pointer-events:none; }
        .particle {
            position: absolute;
            border-radius: 50%;
            animation: floatParticle linear infinite;
            opacity: 0;
        }
        @keyframes floatParticle {
            0%   { transform:translateY(100vh) translateX(0); opacity:0; }
            10%  { opacity:.6; }
            90%  { opacity:.3; }
            100% { transform:translateY(-10vh) translateX(30px); opacity:0; }
        }

        @keyframes fadeSlideDown {
            from { opacity:0; transform:translateY(-20px); }
            to   { opacity:1; transform:translateY(0); }
        }
    </style>
</head>
<body>

    <div class="bg-layer">
        <div class="bg-gradient"></div>
        <div class="dot-grid"></div>
        <div class="grid-lines"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="glow-line glow-line-1"></div>
        <div class="glow-line glow-line-2"></div>
    </div>

    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="logo-badge">
            <span class="logo-icon">🎓</span>
            <span class="logo-text">منصة تعليمية متكاملة</span>
        </div>

        <div class="spinner-wrapper">
            <div class="spinner-ring spinner-ring-1"></div>
            <div class="spinner-ring spinner-ring-2"></div>
            <div class="spinner-ring spinner-ring-3"></div>
            <div class="spinner-core"></div>
        </div>

        <h1 class="main-title">
            نظام إدارة
            <span class="title-highlight">السنتر التعليمي</span>
        </h1>

        <p class="subtitle">وفّر وقتك وطوّر مهاراتك باستخدام الذكاء الاصطناعي</p>

        <div class="progress-container">
            <div class="progress-track">
                <div class="progress-fill"></div>
            </div>
        </div>

        <p class="loading-text">جاري التحميل...</p>
    </div>

    <script>
        // Particles — gold & red palette
        const container = document.getElementById('particles');
        const colors = ['#f5c842', '#e8c96a', '#d4a017', '#e8203a', '#ff6070', '#c0182a'];
        for (let i = 0; i < 28; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration  = (6 + Math.random() * 10) + 's';
            p.style.animationDelay     = (Math.random() * 10) + 's';
            const size = (1 + Math.random() * 3) + 'px';
            p.style.width  = size;
            p.style.height = size;
            p.style.background = colors[Math.floor(Math.random() * colors.length)];
            container.appendChild(p);
        }

        // Redirect logic
        const isLoggedIn = sessionStorage.getItem('isLoggedIn');
        if (isLoggedIn === 'true') {
            window.location.href = 'home.html';
        } else {
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2200);
        }
    </script>
</body>
</html>
